<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Universo de Valentina</title>
<style>
    body, html { margin: 0; height: 100%; background: #000; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }
    canvas { display: block; }

    /* Nombre de Valentina con efecto Neón */
    .header-container {
        position: fixed;
        top: 30px;
        width: 100%;
        text-align: center;
        z-index: 2000;
        pointer-events: none;
    }
    .header-container h1 {
        color: #fff;
        margin: 0;
        font-size: clamp(1.5rem, 8vw, 3rem);
        letter-spacing: 10px;
        text-transform: uppercase;
        text-shadow: 0 0 10px #fff, 0 0 20px #ff00de, 0 0 40px #ff00de;
        animation: neonPulse 2s ease-in-out infinite alternate;
    }
    @keyframes neonPulse {
        from { opacity: 0.7; transform: scale(0.98); }
        to { opacity: 1; transform: scale(1.02); }
    }

    /* Reproductor Mejorado */
    .player {
        position: fixed;
        bottom: 25px;
        left: 50%;
        transform: translateX(-50%);
        width: 85%;
        max-width: 500px;
        display: flex;
        align-items: center;
        gap: 15px;
        padding: 12px 20px;
        border: 1px solid rgba(255, 102, 0, 0.5);
        border-radius: 50px;
        background: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(10px);
        box-shadow: 0 0 20px rgba(255, 102, 0, 0.2);
        z-index: 1000;
        color: #fff;
    }
    .player button {
        background: none;
        border: none;
        color: #f60;
        font-size: 24px;
        cursor: pointer;
        transition: 0.3s;
    }
    .player button:hover { transform: scale(1.2); color: #ff8844; }
    .progress {
        flex-grow: 1;
        height: 8px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        overflow: hidden;
        cursor: pointer;
    }
    .progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #f60, #ff00de);
        box-shadow: 0 0 10px #f60;
    }
    .time { font-size: 11px; min-width: 70px; text-align: right; opacity: 0.8; }
</style>
</head>
<body>

<div class="header-container">
    <h1>Valentina</h1>
</div>

<canvas id="c"></canvas>

<div class="player">
    <button id="play">▶️</button>
    <div class="progress" id="progress"><div class="progress-bar" id="progress-bar"></div></div>
    <div class="time" id="time">0:00 / 0:00</div>
</div>

<audio id="audio" loop>
    <source src="https://www.dropbox.com/scl/fi/qfv28rqu6b36jwusao4x4/Love.MP3?rlkey=ptjd053374f028aa4jfcfrfxn&st=1j0j51eo&raw=1" type="audio/mpeg">
</audio>

<script src="https://cdn.jsdelivr.net/npm/three@0.148.0/build/three.min.js"></script>
<script>
const audio = document.getElementById("audio"),
      playBtn = document.getElementById("play"),
      progress = document.getElementById("progress"),
      progressBar = document.getElementById("progress-bar"),
      timeDisplay = document.getElementById("time");

let isPlaying = false;

function formatTime(e) {
    if (!isFinite(e)) return "0:00";
    return Math.floor(e/60) + ":" + Math.floor(e%60).toString().padStart(2, "0");
}

playBtn.addEventListener("click", async () => {
    if (isPlaying) {
        audio.pause();
        playBtn.textContent = "▶️";
    } else {
        await audio.play();
        playBtn.textContent = "⏸️";
    }
    isPlaying = !isPlaying;
});

audio.addEventListener("timeupdate", () => {
    const e = (audio.currentTime / audio.duration) * 100;
    progressBar.style.width = (isFinite(e) ? e : 0) + "%";
    timeDisplay.textContent = formatTime(audio.currentTime) + " / " + formatTime(audio.duration);
});

progress.addEventListener("click", (e) => {
    const t = progress.getBoundingClientRect(),
          n = (e.clientX - t.left) / t.width;
    if (isFinite(audio.duration)) audio.currentTime = n * audio.duration;
});

// THREE.JS SCENE
const canvas = document.getElementById("c"),
      renderer = new THREE.WebGLRenderer({canvas: canvas, antialias: true});
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(innerWidth, innerHeight);

const scene = new THREE.Scene(),
      camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 5000);
let targetDist = 300, currentDist = 300, rotX = 0.2, rotY = 0;

// Fondo de Espacio
const loader = new THREE.TextureLoader();
scene.background = loader.load("https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/cube/space/px.jpg");

// Lluvia de Estrellas
(function createStars(count = 2000) {
    const geo = new THREE.BufferGeometry(),
          pos = new Float32Array(count * 3);
    for (let i = 0; i < count; i++) {
        const r = 3000 * (0.3 + 0.7 * Math.random()),
              theta = Math.random() * Math.PI * 2,
              phi = Math.acos(2 * Math.random() - 1);
        pos[i*3] = r * Math.sin(phi) * Math.cos(theta);
        pos[i*3+1] = r * Math.cos(phi);
        pos[i*3+2] = r * Math.sin(phi) * Math.sin(theta);
    }
    geo.setAttribute("position", new THREE.BufferAttribute(pos, 3));
    scene.add(new THREE.Points(geo, new THREE.PointsMaterial({size: 1.5, color: 0xffffff, depthWrite: false})));
})();

// Núcleo Central Superbrillante
const core = new THREE.Mesh(
    new THREE.SphereGeometry(40, 64, 64),
    new THREE.MeshPhongMaterial({color: 0xffffff, emissive: 0xff00de, emissiveIntensity: 2, transparent: true, opacity: 0.8})
);
scene.add(core);

function makeTextTexture(text, size = 80, shadow = 50) {
    const canvas = document.createElement("canvas");
    canvas.width = 512; canvas.height = 512;
    const ctx = canvas.getContext("2d");
    ctx.font = `bold ${size}px Arial`;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillStyle = "#fff";
    ctx.shadowColor = "#ff00de";
    ctx.shadowBlur = shadow;
    ctx.fillText(text, 256, 256);
    return new THREE.CanvasTexture(canvas);
}

const centerSprite = new THREE.Sprite(new THREE.SpriteMaterial({map: makeTextTexture("TE AMO ❤️", 90, 70), transparent: true}));
centerSprite.scale.set(70, 70, 1);
scene.add(centerSprite);

// Efecto Glow
const glowTex = (function() {
    const c = document.createElement("canvas"); c.width = c.height = 512;
    const ctx = c.getContext("2d"), g = ctx.createRadialGradient(256, 256, 10, 256, 256, 250);
    g.addColorStop(0, "rgba(255, 0, 222, 0.8)");
    g.addColorStop(0.5, "rgba(255, 100, 0, 0.3)");
    g.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = g; ctx.fillRect(0,0,512,512);
    return new THREE.CanvasTexture(c);
})();
const glow = new THREE.Sprite(new THREE.SpriteMaterial({map: glowTex, transparent: true, blending: THREE.AdditiveBlending}));
glow.scale.set(500, 500, 1);
scene.add(glow);

// Anillos Cinéticos
function ringTex() {
    const c = document.createElement("canvas"); c.width = c.height = 512;
    const ctx = c.getContext("2d"); ctx.translate(256, 256);
    const g = ctx.createRadialGradient(0, 0, 170, 0, 0, 250);
    g.addColorStop(0, "rgba(255, 255, 255, 1)");
    g.addColorStop(0.4, "rgba(255, 0, 222, 0.8)");
    g.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(0,0,250,0,Math.PI*2); ctx.arc(0,0,170,0,Math.PI*2, true); ctx.fill();
    return new THREE.CanvasTexture(c);
}
const r1 = new THREE.Mesh(new THREE.RingGeometry(60, 80, 128), new THREE.MeshBasicMaterial({map: ringTex(), transparent: true, side: THREE.DoubleSide}));
const r2 = new THREE.Mesh(new THREE.RingGeometry(85, 100, 128), new THREE.MeshBasicMaterial({map: ringTex(), transparent: true, side: THREE.DoubleSide, opacity: 0.6}));
r1.rotation.x = r2.rotation.x = Math.PI/2;
scene.add(r1, r2);

// Nube de Palabras
const WORDS = ["💖 Valentina","✨ Mi amor","🌹 Respeto","🤝 Lealtad","👑 Reina","💎 Eres todo","❤️ Te amo","🌌 Mi universo","🌟 Brillas","🔥 Siempre tú","💕 Cariño","🙏 Gracias","🌈 Felicidad","🦋 Mi paz","💫 Magia","🥰 Mi vida","🌸 Eres luz","🔥 Pasión"];
const textGroup = new THREE.Group();
scene.add(textGroup);

const COLORS = ["#ff66ff","#66ccff","#ffd36b","#ff9966","#8df59a","#ffa0f8"];
for (let i = 0; i < 60; i++) {
    const txt = WORDS[i % WORDS.length];
    const sprite = new THREE.Sprite(new THREE.SpriteMaterial({map: makeTextTexture(txt, 50, 20), transparent: true}));
    sprite.scale.set(45, 12, 1);
    const phi = Math.acos(2 * Math.random() - 1),
          theta = Math.random() * Math.PI * 2,
          r = 160 + 100 * Math.random();
    sprite.position.set(r * Math.sin(phi) * Math.cos(theta), r * Math.cos(phi), r * Math.sin(phi) * Math.sin(theta));
    sprite.userData = { phi, theta, r, speed: 0.001 + 0.002 * Math.random() };
    textGroup.add(sprite);
}

// Interacciones
let dragging = false, lastX, lastY;
const onDown = e => { dragging = true; const t = e.touches ? e.touches[0] : e; lastX = t.clientX; lastY = t.clientY; };
const onMove = e => {
    if (!dragging) return;
    const t = e.touches ? e.touches[0] : e;
    rotY -= (t.clientX - lastX) * 0.005;
    rotX = Math.max(-1.2, Math.min(1.2, rotX - (t.clientY - lastY) * 0.005));
    lastX = t.clientX; lastY = t.clientY;
};
addEventListener("mousedown", onDown); addEventListener("mousemove", onMove); addEventListener("mouseup", () => dragging = false);
addEventListener("touchstart", onDown, {passive: true}); addEventListener("touchmove", onMove, {passive: true}); addEventListener("touchend", () => dragging = false);
addEventListener("wheel", e => { targetDist = Math.max(160, Math.min(700, targetDist + e.deltaY * 0.5)); }, {passive: true});

// Animación
function tick() {
    requestAnimationFrame(tick);
    const t = Date.now() * 0.001;
    r1.rotation.z += 0.002; r2.rotation.z -= 0.001;
    const s = 1 + 0.05 * Math.sin(t * 3); core.scale.set(s,s,s);
    glow.scale.set(500 * (1 + 0.02 * Math.sin(t)), 500 * (1 + 0.02 * Math.sin(t)), 1);
    
    textGroup.children.forEach(sp => {
        sp.userData.theta += sp.userData.speed;
        sp.position.x = sp.userData.r * Math.sin(sp.userData.phi) * Math.cos(sp.userData.theta);
        sp.position.z = sp.userData.r * Math.sin(sp.userData.phi) * Math.sin(sp.userData.theta);
    });

    currentDist += 0.05 * (targetDist - currentDist);
    camera.position.set(currentDist * Math.sin(rotY) * Math.cos(rotX), currentDist * Math.sin(rotX), currentDist * Math.cos(rotY) * Math.cos(rotX));
    camera.lookAt(0,0,0);
    renderer.render(scene, camera);
}
tick();

window.onresize = () => {
    renderer.setSize(innerWidth, innerHeight);
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
};
</script>
</body>
</html>
